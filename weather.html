<!DOCTYPE html>
<html>
  <head>
    <title>Weather App</title>
    <style>
      body {
        font-family: Arial;
        background-color: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        background-color: #16213e;
        padding: 40px;
        border-radius: 15px;
        text-align: center;
        width: 350px;
        color: white;
      }
      h1 {
        color: #2980b9;
        margin-bottom: 20px;
      }
      .input-area {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      input {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
      }
      button {
        padding: 10px 20px;
        background-color: #2980b9;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background-color: #1a5276;
      }
      .weather-info {
        display: none;
        margin-top: 20px;
      }
      .city-name {
        font-size: 24px;
        font-weight: bold;
        color: #2980b9;
      }
      .temperature {
        font-size: 48px;
        font-weight: bold;
        color: white;
        margin: 10px 0;
      }
      .description {
        font-size: 18px;
        color: #bdc3c7;
        text-transform: capitalize;
      }
      .details {
        display: flex;
        justify-content: space-around;
        margin-top: 20px;
        color: #bdc3c7;
      }
      .error {
        color: #e74c3c;
        margin-top: 10px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🌤️ Weather App</h1>
      <div class="input-area">
        <input type="text" id="cityInput" placeholder="Enter city name..." />
        <button onclick="getWeather()">Search</button>
      </div>
      <p class="error" id="error">City not found! Try again.</p>
      <div class="weather-info" id="weatherInfo">
        <p class="city-name" id="cityName"></p>
        <p class="temperature" id="temperature"></p>
        <p class="description" id="description"></p>
        <div class="details">
          <div>
            <p>💧 Humidity</p>
            <p id="humidity"></p>
          </div>
          <div>
            <p>💨 Wind</p>
            <p id="wind"></p>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_KEY = "aa68167c643a16481b4198936a12d5d2";

      async function getWeather() {
        let city = document.getElementById("cityInput").value;

        if (city === "") {
          alert("Please enter a city name!");
          return;
        }

        const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`;

        try {
          let response = await fetch(url);
          let data = await response.json();

          if (data.cod === "404") {
            document.getElementById("error").style.display = "block";
            document.getElementById("weatherInfo").style.display = "none";
            return;
          }

          document.getElementById("error").style.display = "none";
          document.getElementById("weatherInfo").style.display = "block";
          document.getElementById("cityName").textContent = data.name + ", " + data.sys.country;
          document.getElementById("temperature").textContent = Math.round(data.main.temp) + "°C";
          document.getElementById("description").textContent = data.weather[0].description;
          document.getElementById("humidity").textContent = data.main.humidity + "%";
          document.getElementById("wind").textContent = data.wind.speed + " m/s";

        } catch (error) {
          alert("Something went wrong! Check your API key.");
        }
      }
    </script>
  </body>
</html>
